<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>todolist</title>
  <script src="js/jquery-2.1.3.min.js"></script>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <h1>todo list</h1>

  <main>
    <div class="input-area">
      <input type="date" value="2026-05-29" name="shimekiri" id="shimekiri">
      <textarea id="text" placeholder="todo"></textarea>
    </div>

    <div class="button-area">
      <button id="save">登録</button>
      <button id="clear">達成したタスクを削除</button>
    </div>
  </main>

  <ul id="list">
    </ul>

  <footer>
  </footer>
  
  <script>
    // 画面を描画する共通の関数（常に日付順にソートして表示）
    function render() {
      const todoList = [];

      // ① LocalStorageのデータをすべて配列に集める
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        const value = localStorage.getItem(key);
        todoList.push({ shimekiri: key, text: value });
      }

      // ② 配列を日付（shimekiri）の早い順に並び替える
      todoList.sort(function (a, b) {
        if (a.shimekiri < b.shimekiri) return -1;
        if (a.shimekiri > b.shimekiri) return 1;
        return 0;
      });

      // ③ 画面（#list）を一度クリアして、並び替えたデータを再出力
      $("#list").empty();
      todoList.forEach(function (item) {
        // 💡ポイント: liタグに data-key を仕込み、checkboxに共通のクラス名をつけています
        const html = `
          <li data-key="${item.shimekiri}">
            <input type="checkbox" class="todo-check">
            <p>${item.shimekiri}</p>
            <p>${item.text}</p>
          </li>
        `;
        $("#list").append(html);
      });
    }


    // 1. Save クリックイベント（決定ボタン）
    $("#save").on("click", function () {
      const key = $("#shimekiri").val();
      const value = $("#text").val();

      if (!key || !value) return; // 空欄なら処理しない

      // LocalStorageに保存
      localStorage.setItem(key, value);
      
      // 入力フォームをクリア（連続入力しやすくするため）
      $("#text").val("");

      // 再描画（自動で日付順に並び替わります）
      render();
    });


    // 2. リアルタイムチェックイベント（打ち消し線の切り替え）
    $("#list").on("change", ".todo-check", function () {
      const $li = $(this).closest("li");

      if ($(this).prop("checked")) {
        $li.addClass("completed"); 
      } else {
        $li.removeClass("completed");
      }
    });


    // 3. Clear クリックイベント（選択削除ボタン）
    $("#clear").on("click", function () {
      // 💡ポイント: チェックが入っている .todo-check をすべてループ処理
      $(".todo-check:checked").each(function () {
        const $li = $(this).closest("li");
        const key = $li.data("key"); // <li> から日付（キー）を取得

        // LocalStorage から削除
        localStorage.removeItem(key);
      });

      // 削除後の状態に画面を更新
      render();
    });


    // 4. ページ読み込み時の初期表示
    render();

  </script>
</body>

</html>
